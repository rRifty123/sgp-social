<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGP Social - Secure Connect</title>
    <style>
        :root {
            --primary: #6366f1; --accent: #ec4899; --bg: #0f172a;
            --surface: #1e293b; --text: #f8fafc; --text-dim: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #000; color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; }

        #selector-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #app-container { position: relative; background: var(--bg); display: none; overflow: hidden; z-index: 1; }
        .device-phone { width: 375px; height: 750px; border: 8px solid #334155; border-radius: 40px; display: block !important; }
        .device-desktop { width: 100vw; height: 100vh; display: block !important; }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; overflow-y: auto; padding-bottom: 80px; }
        .active { display: flex !important; }

        .btn { padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: var(--primary); color: white; margin: 2px; font-size: 0.8rem; }
        .input-box { width: 90%; padding: 12px; margin: 8px auto; background: var(--surface); border: 1px solid #334155; color: white; border-radius: 8px; display: block; }
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 65px; background: #1e293b; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; z-index: 100; }
        
        .post { background: var(--surface); margin-bottom: 10px; padding: 15px; border-bottom: 1px solid #334155; }
        .post-actions { display: flex; gap: 10px; margin-top: 10px; color: var(--text-dim); font-size: 0.75rem; align-items: center; }
        .stat { cursor: pointer; border: 1px solid #475569; padding: 3px 8px; border-radius: 15px; }

        .chat-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 6000; display: none; flex-direction: column; }
        .msg { padding: 10px; border-radius: 10px; margin: 5px; max-width: 80%; font-size: 0.9rem; }
        .msg-me { align-self: flex-end; background: var(--primary); }
        .msg-them { align-self: flex-start; background: var(--surface); }

        .friend-card { background: var(--surface); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="selector-layer">
        <h1>SGP Social</h1>
        <button class="btn" onclick="launch('device-phone')" style="width:200px">📱 Phone View</button>
        <button class="btn" onclick="launch('device-desktop')" style="width:200px">💻 Desktop View</button>
    </div>

    <div id="app-container">
        <div id="signup-screen" class="screen"><div style="margin:auto; width:100%; text-align:center; padding:20px;"><h2>Join SGP</h2><input type="text" id="reg-user" class="input-box" placeholder="Username"><input type="text" id="reg-name" class="input-box" placeholder="Name"><input type="password" id="reg-pass" class="input-box" placeholder="Password"><button class="btn" style="width:90%" onclick="doSignup()">Sign Up</button><p onclick="showScreen('login-screen')" style="margin-top:10px; cursor:pointer; color:var(--accent)">Login instead</p></div></div>
        <div id="login-screen" class="screen"><div style="margin:auto; width:100%; text-align:center; padding:20px;"><h2>Login</h2><input type="text" id="log-user" class="input-box" placeholder="Username"><input type="password" id="log-pass" class="input-box" placeholder="Password"><button class="btn" style="width:90%" onclick="doLogin()">Login</button></div></div>

        <div id="feed-screen" class="screen active">
            <div style="padding: 15px; border-bottom: 1px solid #334155;"><h3>SGP Feed</h3></div>
            <div id="feed-items"></div>
        </div>

        <div id="friends-screen" class="screen">
            <div style="padding: 15px; border-bottom: 1px solid #334155;"><h3>Social</h3></div>
            <div style="padding: 10px;">
                <input type="text" id="f-search" class="input-box" placeholder="Search users..." onkeyup="renderFriends()">
                <div id="pending-req-area"></div>
                <hr style="border:0; border-top:1px solid #334155; margin:10px 0;">
                <div id="friends-list"></div>
            </div>
        </div>

        <div id="profile-screen" class="screen">
            <div style="padding: 30px 15px; text-align: center; background: #1e293b;">
                <h2 id="view-name">Name</h2>
                <p id="view-handle" style="color:var(--text-dim)">@user</p>
                <div style="display:flex; justify-content:center; gap:15px; margin: 10px 0; font-size: 0.8rem;">
                    <span><b id="count-foll">0</b> Following</span>
                    <span><b id="count-friends">0</b> Friends</span>
                </div>
                <div id="profile-actions"></div>
            </div>
            <div id="view-posts"></div>
        </div>

        <div id="chat-modal" class="chat-modal">
            <div style="padding:15px; border-bottom:1px solid #334155; display:flex; justify-content:space-between; align-items:center;">
                <h4 id="chat-title">Chat</h4>
                <button class="btn" onclick="closeChat()">Close</button>
            </div>
            <div id="chat-msgs" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; padding:10px;"></div>
            <div style="padding:10px; display:flex; gap:5px;">
                <input type="text" id="chat-input" class="input-box" style="margin:0; flex:1" placeholder="Type message...">
                <button class="btn" onclick="sendMsg()">Send</button>
            </div>
        </div>

        <div class="nav-bar">
            <span onclick="showScreen('feed-screen')">🏠</span>
            <span onclick="showScreen('friends-screen')">💬</span>
            <span onclick="openPostModal()" style="font-size:1.5rem; color:var(--accent)">+</span>
            <span onclick="viewProfile(currentUser.user)">👤</span>
        </div>
    </div>

    <div id="post-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:9000; display:none; flex-direction:column; padding:20px;">
        <h2>New Post</h2>
        <textarea id="post-text" placeholder="Speak your mind..." style="width:100%; height:150px; background:var(--surface); color:white; padding:12px; border:none; margin:15px 0; border-radius:10px;"></textarea>
        <button class="btn" style="background:var(--accent)" onclick="makePost()">Post</button>
        <button class="btn" style="background:transparent" onclick="closePostModal()">Cancel</button>
    </div>

    <script>
      <script type="module">
  // 1. Import Firebase Engines (CDN Version for GitHub)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, setDoc, doc, getDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 2. Your SGP Config (Already plugged in!)
  const firebaseConfig = {
    apiKey: "AIzaSyBlUwtRiZ0dEw881_PV6JK3nFeKF2gwAMI",
    authDomain: "sgp-social.firebaseapp.com",
    projectId: "sgp-social",
    storageBucket: "sgp-social.firebasestorage.app",
    messagingSenderId: "886036235471",
    appId: "1:886036235471:web:4bc1421cdc95da504ae3ba"
  };

  // 3. Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Global variables to keep the app running smooth
  let currentUser = JSON.parse(localStorage.getItem('sgp_session')) || null;
  let allUsers = {};
  let allPosts = [];

  // --- AUTH LOGIC ---
  window.doSignup = async () => {
    const u = document.getElementById('reg-user').value.toLowerCase().trim();
    const n = document.getElementById('reg-name').value;
    const p = document.getElementById('reg-pass').value;
    if(!u || !p) return alert("Fill in details");

    const userRef = doc(db, "users", u);
    const userSnap = await getDoc(userRef);
    if (userSnap.exists()) return alert("Username taken!");

    const userData = { user: u, name: n, pass: p, friends: [], following: [], requests: [] };
    await setDoc(userRef, userData);
    localStorage.setItem('sgp_session', JSON.stringify(userData));
    location.reload();
  };

  window.doLogin = async () => {
    const u = document.getElementById('log-user').value.toLowerCase().trim();
    const p = document.getElementById('log-pass').value;
    const userSnap = await getDoc(doc(db, "users", u));

    if (userSnap.exists() && userSnap.data().pass === p) {
      localStorage.setItem('sgp_session', JSON.stringify(userSnap.data()));
      location.reload();
    } else { alert("Login failed!"); }
  };

  // --- REAL-TIME DATA ---
  const qPosts = query(collection(db, "posts"), orderBy("createdAt", "desc"));
  onSnapshot(qPosts, (snapshot) => {
    allPosts = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
    renderFeed();
  });

  onSnapshot(collection(db, "users"), (snapshot) => {
    snapshot.forEach(doc => { allUsers[doc.id] = doc.data(); });
    if(currentUser && allUsers[currentUser.user]) {
      currentUser = allUsers[currentUser.user];
      localStorage.setItem('sgp_session', JSON.stringify(currentUser));
    }
  });

  // --- UI ACTIONS ---
  window.launch = (device) => {
    document.getElementById('selector-layer').remove();
    const app = document.getElementById('app-container');
    app.className = device; app.style.display = 'block';
    if (!currentUser) showScreen('signup-screen');
  };

  window.showScreen = (id) => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  };

  window.makePost = async () => {
    const t = document.getElementById('post-text').value;
    if(!t || !currentUser) return;
    await addDoc(collection(db, "posts"), {
      author: currentUser.user,
      content: t,
      hearts: [],
      createdAt: serverTimestamp()
    });
    document.getElementById('post-text').value = "";
    document.getElementById('post-modal').style.display = 'none';
  };

  window.renderFeed = () => {
    const c = document.getElementById('feed-items');
    if(!c) return;
    c.innerHTML = allPosts.map(p => `
      <div class="post" style="background:#1e293b; padding:15px; margin-bottom:1px; border-bottom:1px solid #334155;">
        <strong style="color:#6366f1; cursor:pointer;" onclick="viewProfile('${p.author}')">@${p.author}</strong>
        <p style="margin:10px 0; color:white;">${p.content}</p>
      </div>
    `).join('');
  };

  window.viewProfile = (handle) => {
    const u = allUsers[handle];
    if(!u) return;
    showScreen('profile-screen');
    document.getElementById('view-name').innerText = u.name;
    document.getElementById('view-handle').innerText = "@" + u.user;
    
    const actions = document.getElementById('profile-actions');
    if(handle !== currentUser.user) {
        actions.innerHTML = `<button class="btn" onclick="alert('Connection pending database rules!')">Add Friend</button>`;
    } else {
        actions.innerHTML = `<button class="btn" style="background:#ef4444" onclick="localStorage.clear(); location.reload();">Logout</button>`;
    }
  };

  window.openPostModal = () => document.getElementById('post-modal').style.display = 'flex';
  window.closePostModal = () => document.getElementById('post-modal').style.display = 'none';

  // Initial Check
  if(currentUser) {
    showScreen('feed-screen');
    renderFeed();
  }
</script>
</script>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SGP Social</title>
    <style>
        :root { --primary: #6366f1; --accent: #ec4899; --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; --text-dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; width: 100vw; overflow: hidden; position: fixed; }
        
        #app-container { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .screen { flex: 1; overflow-y: auto; display: none; padding-bottom: 100px; -webkit-overflow-scrolling: touch; }
        .active { display: flex !important; flex-direction: column; }

        .btn { padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; background: var(--primary); color: white; margin: 5px; font-size: 16px; width: 90%; align-self: center; }
        .input-box { width: 90%; padding: 14px; margin: 8px auto; background: var(--surface); border: 1px solid #334155; color: white; border-radius: 12px; display: block; font-size: 16px; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; padding-bottom: 20px; z-index: 1000; }
        .nav-item { font-size: 1.6rem; padding: 10px; cursor: pointer; }

        .post { background: var(--surface); margin-bottom: 1px; padding: 15px; border-bottom: 1px solid #334155; }
        #post-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; flex-direction: column; padding: 20px; padding-top: 60px; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="signup-screen" class="screen">
            <div style="margin:auto; width:100%; text-align:center;">
                <h1>SGP</h1>
                <input type="text" id="reg-user" class="input-box" placeholder="Username">
                <input type="text" id="reg-name" class="input-box" placeholder="Name">
                <input type="password" id="reg-pass" class="input-box" placeholder="Password">
                <button class="btn" onclick="window.doSignup()">Create Account</button>
                <p onclick="window.showScreen('login-screen')" style="margin-top:20px; color: var(--accent)">Login</p>
            </div>
        </div>

        <div id="login-screen" class="screen">
             <div style="margin:auto; width:100%; text-align:center;">
                <h2>Login</h2>
                <input type="text" id="log-user" class="input-box" placeholder="Username">
                <input type="password" id="log-pass" class="input-box" placeholder="Password">
                <button class="btn" onclick="window.doLogin()">Login</button>
            </div>
        </div>

        <div id="feed-screen" class="screen">
            <div style="padding: 20px; padding-top: 40px;"><h2>Feed</h2></div>
            <div id="feed-items"></div>
        </div>

        <div id="friends-screen" class="screen">
            <div style="padding: 20px; padding-top: 40px;"><h2>Friends</h2></div>
            <div id="friends-list" style="padding: 10px;"></div>
        </div>

        <div id="profile-screen" class="screen">
            <div id="profile-header" style="text-align: center; padding: 40px 20px; background: var(--surface);">
                <h2 id="view-name">Name</h2>
                <p id="view-handle" style="color: var(--text-dim)">@user</p>
                <div id="profile-actions" style="margin-top: 20px;"></div>
            </div>
            <div id="view-posts"></div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item" onclick="window.showScreen('feed-screen')">🏠</div>
            <div class="nav-item" onclick="window.showScreen('friends-screen')">👥</div>
            <div class="nav-item" onclick="window.openPostModal()" style="color:var(--accent); font-weight:bold; font-size:2rem;">+</div>
            <div class="nav-item" onclick="window.viewProfile(window.currentUser.user)">👤</div>
        </nav>
    </div>

    <div id="post-modal">
        <h2>New Post</h2>
        <textarea id="post-text" class="input-box" style="height: 150px;" placeholder="What's happening?"></textarea>
        <input type="file" id="media-input" accept="image/*" style="display:none" onchange="window.previewFile(this)">
        <button class="btn" style="background:#475569" onclick="document.getElementById('media-input').click()">📷 Add Media</button>
        <p id="file-status" style="text-align:center; margin:10px; font-size:12px; color:var(--accent)"></p>
        <button class="btn" onclick="window.makePost()">Post</button>
        <button class="btn" style="background:transparent" onclick="window.closePostModal()">Cancel</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, setDoc, doc, getDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBlUwtRiZ0dEw881_PV6JK3nFeKF2gwAMI",
            authDomain: "sgp-social.firebaseapp.com",
            projectId: "sgp-social",
            storageBucket: "sgp-social.firebasestorage.app",
            messagingSenderId: "886036235471",
            appId: "1:886036235471:web:4bc1421cdc95da504ae3ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.currentUser = JSON.parse(localStorage.getItem('sgp_session')) || null;
        let allUsers = {};
        let allPosts = [];
        let pendingMedia = null;

        // --- NAVIGATION ---
        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const screen = document.getElementById(id);
            if(screen) screen.classList.add('active');
            if(id === 'friends-screen') renderFriendsList();
        };

        // --- MEDIA FIX ---
        window.previewFile = (input) => {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    pendingMedia = e.target.result;
                    document.getElementById('file-status').innerText = "Image Ready! 📸";
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        // --- AUTH ---
        window.doSignup = async () => {
            const u = document.getElementById('reg-user').value.toLowerCase().trim();
            const n = document.getElementById('reg-name').value;
            const p = document.getElementById('reg-pass').value;
            if(!u || !p) return alert("Fill in details");
            const userRef = doc(db, "users", u);
            const userData = { user: u, name: n, pass: p, friends: [], following: [], requests: [] };
            await setDoc(userRef, userData);
            window.currentUser = userData;
            localStorage.setItem('sgp_session', JSON.stringify(userData));
            location.reload();
        };

        window.doLogin = async () => {
            const u = document.getElementById('log-user').value.toLowerCase().trim();
            const p = document.getElementById('log-pass').value;
            const snap = await getDoc(doc(db, "users", u));
            if(snap.exists() && snap.data().pass === p) {
                window.currentUser = snap.data();
                localStorage.setItem('sgp_session', JSON.stringify(window.currentUser));
                location.reload();
            } else { alert("Login failed"); }
        };

        // --- POSTING (STABILITY FIX) ---
        window.makePost = async () => {
            const t = document.getElementById('post-text').value;
            if(!t && !pendingMedia) return alert("Add text or an image!");

            try {
                // Post to Firebase
                await addDoc(collection(db, "posts"), {
                    author: window.currentUser.user,
                    content: t || "",
                    media: pendingMedia || null,
                    hearts: [],
                    breaks: [],
                    replies: [],
                    createdAt: serverTimestamp()
                });
                
                // Reset UI
                window.closePostModal();
            } catch (e) {
                console.error(e);
                alert("Post failed. Try again.");
            }
        };

        window.addReply = async (postId) => {
            const replyInput = document.getElementById(`reply-to-${postId}`);
            if (!replyInput.value) return;
            const postRef = doc(db, "posts", postId);
            await updateDoc(postRef, {
                replies: arrayUnion({
                    author: window.currentUser.user,
                    text: replyInput.value,
                    at: Date.now()
                })
            });
            replyInput.value = "";
        };

        window.react = async (postId, type) => {
            const postRef = doc(db, "posts", postId);
            const post = allPosts.find(p => p.id === postId);
            const user = window.currentUser.user;
            if (post[type]?.includes(user)) {
                await updateDoc(postRef, { [type]: arrayRemove(user) });
            } else {
                await updateDoc(postRef, { [type]: arrayUnion(user) });
            }
        };

        // --- MESSAGING ---
        window.openChat = (friendHandle) => {
            const chatId = [window.currentUser.user, friendHandle].sort().join('_');
            const msgText = prompt(`Message @${friendHandle}:`);
            if(!msgText) return;
            addDoc(collection(db, "messages"), {
                chatId: chatId,
                from: window.currentUser.user,
                text: msgText,
                at: serverTimestamp()
            });
            alert("Message Sent!");
        };

        // --- SOCIAL ---
        window.toggleFollow = async (targetUser) => {
            const myRef = doc(db, "users", window.currentUser.user);
            const isFollowing = window.currentUser.following?.includes(targetUser);
            await updateDoc(myRef, { following: isFollowing ? arrayRemove(targetUser) : arrayUnion(targetUser) });
        };

        window.sendRequest = async (targetUser) => {
            await updateDoc(doc(db, "users", targetUser), { requests: arrayUnion(window.currentUser.user) });
            alert("Friend Request Sent!");
        };

        window.acceptFriend = async (targetUser) => {
            await updateDoc(doc(db, "users", window.currentUser.user), { friends: arrayUnion(targetUser), requests: arrayRemove(targetUser) });
            await updateDoc(doc(db, "users", targetUser), { friends: arrayUnion(window.currentUser.user) });
        };

        // --- UI RENDERING ---
        window.renderFeed = () => {
            const feed = document.getElementById('feed-items');
            if(!feed) return;
            feed.innerHTML = allPosts.map(p => `
                <div class="post">
                    <strong onclick="window.viewProfile('${p.author}')" style="color:var(--primary)">@${p.author}</strong>
                    <p style="margin:10px 0">${p.content || ""}</p>
                    ${p.media ? `<img src="${p.media}" style="width:100%; border-radius:10px; margin-bottom:10px;">` : ""}
                    <div style="display:flex; gap:15px; margin-bottom:15px; font-size:0.8rem;">
                        <span onclick="window.react('${p.id}', 'hearts')">❤️ ${p.hearts?.length || 0}</span>
                        <span onclick="window.react('${p.id}', 'breaks')">💔 ${p.breaks?.length || 0}</span>
                    </div>
                    <div class="replies" style="border-left:2px solid #334155; padding-left:10px; margin-bottom:10px;">
                        ${(p.replies || []).map(r => `<p style="font-size:0.8rem; margin:4px 0"><b>@${r.author}:</b> ${r.text}</p>`).join('')}
                    </div>
                    <div style="display:flex; gap:5px;">
                        <input id="reply-to-${p.id}" class="input-box" style="margin:0; height:35px; font-size:0.8rem;" placeholder="Reply...">
                        <button class="btn" style="width:60px; padding:0; height:35px;" onclick="window.addReply('${p.id}')">Send</button>
                    </div>
                </div>
            `).join('');
        };

        window.viewProfile = (handle) => {
            const u = allUsers[handle];
            if(!u) return;
            document.getElementById('view-name').innerText = u.name;
            document.getElementById('view-handle').innerText = "@" + u.user;
            let btns = "";
            if(handle === window.currentUser.user) {
                btns = `<button class="btn" style="background:#ef4444" onclick="localStorage.clear(); location.reload();">Logout</button>`;
            } else {
                const isFriend = window.currentUser.friends?.includes(handle);
                const isFollowing = window.currentUser.following?.includes(handle);
                btns += `<button class="btn" onclick="window.toggleFollow('${handle}')">${isFollowing ? 'Unfollow' : 'Follow'}</button>`;
                if(!isFriend) btns += `<button class="btn" onclick="window.sendRequest('${handle}')">Add Friend</button>`;
                else btns += `<button class="btn" style="background:#22c55e" onclick="window.openChat('${handle}')">Message</button>`;
            }
            document.getElementById('profile-actions').innerHTML = btns;
            window.showScreen('profile-screen');
        };

        function renderFriendsList() {
            const list = document.getElementById('friends-list');
            let html = "<h4>Requests</h4>";
            (window.currentUser.requests || []).forEach(r => {
                html += `<div class="post" style="display:flex; justify-content:space-between; align-items:center;">@${r} <button class="btn" style="width:80px" onclick="window.acceptFriend('${r}')">Accept</button></div>`;
            });
            html += "<h4 style='margin-top:20px'>Friends</h4>";
            (window.currentUser.friends || []).forEach(f => {
                html += `<div class="post" style="display:flex; justify-content:space-between; align-items:center;">@${f} <button class="btn" style="width:80px; background:#22c55e" onclick="window.openChat('${f}')">Chat</button></div>`;
            });
            list.innerHTML = html;
        }

        // --- REAL-TIME DATA ---
        onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
            allPosts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            window.renderFeed();
        });

        onSnapshot(collection(db, "users"), (snap) => {
            snap.forEach(d => { 
                allUsers[d.id] = d.data();
                if(window.currentUser && d.id === window.currentUser.user) {
                    window.currentUser = d.data();
                    localStorage.setItem('sgp_session', JSON.stringify(window.currentUser));
                }
            });
        });

        window.openPostModal = () => document.getElementById('post-modal').style.display = 'flex';
        window.closePostModal = () => {
            document.getElementById('post-modal').style.display = 'none';
            pendingMedia = null;
            document.getElementById('file-status').innerText = "";
            document.getElementById('post-text').value = "";
        };

        if(window.currentUser) { window.showScreen('feed-screen'); } else { window.showScreen('signup-screen'); }
    </script>
</body>
</html>

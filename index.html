<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGP Social</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 480px; min-height: 100vh; border-left: 1px solid #222; border-right: 1px solid #222; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; max-width: 480px; display: flex; justify-content: space-around; background: #000; border-top: 1px solid #222; padding: 15px 0; }
        .post { border-bottom: 1px solid #222; padding: 20px; }
        .hidden { display: none; }
        button { background: #1d9bf0; color: #fff; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <!-- Auth -->
    <div id="auth-screen">
        <h2>Welcome to SGP</h2>
        <input id="email" placeholder="Email"><input type="password" id="pass" placeholder="Password">
        <button id="login">Login</button><button id="signup">Signup</button>
    </div>

    <!-- Feed -->
    <div id="main-screen" class="hidden">
        <header style="padding:15px; border-bottom:1px solid #222;">SGP</header>
        <div id="feed"></div>
        <div class="nav-bottom">
            <button onclick="navigate('feed')">Home</button>
            <button onclick="navigate('profile')">Profile</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBlUwtRiZ0dEw881_PV6JK3nFeKF2gwAMI", authDomain: "sgp-social.firebaseapp.com", projectId: "sgp-social", storageBucket: "sgp-social.firebasestorage.app", messagingSenderId: "886036235471", appId: "1:886036235471:web:4bc1421cdc95da504ae3ba" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Auth Logic
    document.getElementById("login").onclick = () => signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("pass").value);
    document.getElementById("signup").onclick = () => createUserWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("pass").value);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("auth-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            loadFeed();
        }
    });

    // Real-time Feed
    function loadFeed() {
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById("feed");
            feed.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                feed.innerHTML += `<div class="post">${data.text || "New Post"}<br><button onclick="alert('Liked!')">Like</button></div>`;
            });
        });
    }

    window.navigate = (page) => {
        if(page === 'profile') alert("Viewing Profile for: " + auth.currentUser.email);
        else loadFeed();
    };
</script>
</body>
</html>
